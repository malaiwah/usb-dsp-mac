name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # hidapi (cython-hidapi) links libhidapi at import time; install
      # the system package so `import hid` works even though the tests
      # don't touch real USB.
      - name: Install libhidapi (system)
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev libhidapi-hidraw0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (all extras + dev)
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -q
